  # Upgrade modals - Feature upgrade prompts
  # ========================================
  upgrade:
    titles:
      createDiagram: ¡Has alcanzado el límite de diagramas! # Diagram limit title
      detailLevels: ¡Descubriste una función paga! # Detail levels title
      detailLevelsDbdocs: ¡Descubriste una función de proyectos pagados! # DBDocs detail levels title
      diagramView: Crear vistas adicionales es una función paga # Diagram view title
      headerColor: ¡Descubriste una función paga! # Header color title
      headerColorDbdocs: ¡Descubriste una función de proyectos pagados! # DBDocs header color title
      privateDiagram: ¡Descubriste una función paga! # Private diagram title
      stickyNotes: ¡Descubriste una función paga! # Sticky notes title
      stickyNotesDbdocs: ¡Descubriste una función de proyectos pagados! # DBDocs sticky notes title
      versionHistory: ¡Descubriste una función paga! # Version history title
      aiAssistant: ¡El asistente de IA de dbdiagram es una función paga! # AI assistant title
      tableGroup: ¡Descubriste una función paga! # Table group title
      tableGroupDbdocs: ¡Descubriste una función de proyectos pagados! # DBDocs table group title
      invitePeople: ¡Descubriste una función paga! # Invite people title
    descriptions:
      createDiagram: ¡Actualízate a nuestros planes de pago ahora para <b>crear diagramas <br> ilimitados</b> y disfrutar de otras funciones avanzadas! # Description
      detailLevels: ¡Actualízate a nuestros planes de pago ahora para obtener Niveles de Detalle, Color de Encabezado,<br>Grupo de Tablas y acceder a todas nuestras funciones próximas! # Description
      detailLevelsDbdocs: ¡Actualiza tu proyecto para obtener Niveles de Detalle, Color de Encabezado,<br>Grupo de Tablas y acceder a todas nuestras funciones próximas! # DBDocs description
      diagramView: En el plan gratuito, solo puedes guardar la vista predeterminada.<br>Actualiza a nuestros planes de pago ahora para <b>vistas de diagrama ilimitadas</b> y otras funciones avanzadas! # Description
      headerColor: ¡Actualízate a nuestros planes de pago ahora para obtener Niveles de Detalle, Color de Encabezado,<br>Color de Relación, Grupo de Tablas y acceder a todas nuestras funciones próximas! # Description
      headerColorDbdocs: ¡Actualiza tu proyecto para obtener Niveles de Detalle, Color de Encabezado,<br>Color de Relación, Grupo de Tablas y acceder a todas nuestras funciones próximas! # DBDocs description
      privateDiagram: ¡Actualízate a nuestros planes de pago ahora para proteger tus diagramas con<br><strong> Protección por Contraseña, Modo Privado </strong> y otras funciones avanzadas! # Description
      stickyNotes: ¡Actualízate a nuestros planes de pago ahora para incluir<strong> Notas Adhesivas </strong> en tu diagrama<br> y aprovechar otras funciones avanzadas! # Description
      stickyNotesDbdocs: ¡Actualiza tu proyecto para incluir<strong> Notas Adhesivas </strong> en tu diagrama<br> y aprovechar otras funciones avanzadas! # DBDocs description
      versionHistory: Experimenta libremente tus ideas con diferentes <b>versiones del esquema</b>.<br>Regresa a una versión pasada cuando quieras. # Description
      aiAssistant: ¡Actualízate a nuestros planes de pago ahora para diseñar y optimizar tus esquemas de base de datos<br>con <strong>asistencia de lenguaje natural impulsada por IA</strong> # Description
      tableGroup: ¡Actualízate a nuestros planes de pago ahora para obtener Niveles de Detalle, Color de Encabezado,<br>Grupo de Tablas y acceder a todas nuestras funciones próximas! # Description
      tableGroupDbdocs: ¡Actualiza tu proyecto para obtener Niveles de Detalle, Color de Encabezado,<br>Grupo de Tablas y acceder a todas nuestras funciones próximas! # DBDocs description
      invitePeople: ¡Actualízate a nuestros planes de pago ahora para colaborar en el diseño de diagramas ER con<br><strong> Invitar Colaboradores, Publicar Diagramas Editables </strong> y otras funciones avanzadas! # Description
    buttons:
      viewPlans: Ver planes # View plans button
      upgradeProject: Actualizar proyecto # Upgrade project button

  # ========================================
