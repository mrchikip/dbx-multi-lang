  # ========================================
  errors:
    inviteMaxEmails: No puedes invitar más de 50 correos electrónicos # Validation error
    inviteFailed: No se pudo invitar, por favor intenta de nuevo! # Error toast
    cannotGetCollaborators: No se pueden obtener las información de colaboradores! # Error toast
    permissionUpdateFailed: Error al actualizar permisos # Error toast
    permissionUpdateSuccess: Permisos actualizados exitosamente # Success toast
    inviteSent: Invitación enviada # Success toast
    permissionDenied: Permiso denegado # Permission error
    cannotGetWorkspaceParticipants: No se pueden obtener los participantes del espacio de trabajo, por favor intenta de nuevo! # Error toast
    cannotGetUserWorkspaces: No se pueden obtener los espacios de trabajo del usuario, por favor intenta de nuevo! # Error toast
    cannotGetWorkspacesSubscription: No se puede obtener la suscripción de los espacios de trabajo, por favor intenta de nuevo! # Error toast
    exportSqlFailed: Error al exportar SQL, por favor actualiza el esquema de tu base de datos y vuelve a intentarlo. # Error toast
    savePdfFailed: No se pudo guardar tu pdf # Error toast
    saveSvgFailed: No se pudo guardar tu svg # Error toast
    savePngFailed: No se pudo guardar tu png # Error toast
    cannotGetDiagrams: No se pueden obtener los diagramas, por favor intenta recargar la aplicación! # Error toast
    cannotRemoveDefaultView: No tienes permiso para eliminar la vista predeterminada! # Error toast
    cannotRemoveView: No se puede eliminar esta vista, por favor recarga y vuelve a intentarlo! # Error toast
    removeViewTitle: ¿Eliminar Vista de Diagrama? # Remove view modal title
    removeViewContent: ¿Quieres eliminar la vista "{name}"? # Remove view confirmation
    cancel: Cancelar # Cancel button
    removeView: Eliminar Vista # Remove view button
    close: Cerrar # Close button
    reload: Recargar # Reload button

  # ========================================
  # Workspace type labels
  # ========================================
  workspaceType:
    personal: Espacio de trabajo personal # Personal workspace label
    team: Espacio de trabajo en equipo # Team workspace label

  # ========================================
  # Detail levels dropdown
  # ========================================
  detailLevelsDropdown:
    tableNames: Nombres de tablas # Show table names only
    keysOnly: Solo llaves # Show keys only
    allFields: Todos los campos # Show all fields

  # ========================================
  # Migration preview modal
  # ========================================
  migrationPreview:
    title: Vistas de diagrama ahora en tu código DBML # Modal title
    description: >-
      Hemos movido tus configuraciones de vista de diagrama directamente a tu código DBML como bloques DiagramView.
      Esto hace que tus vistas formen parte de tu código DBML junto con tu esquema.
    learnMore: Aprende más sobre las Vistas de Diagrama
    confirm: Continuar
