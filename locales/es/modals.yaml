  history:
    title: Historial de versiones # Modal title
    deletedUser: Usuario eliminado # Deleted user label
    restoreVersion: Restaurar versión # Restore button
    makeCopy: Hacer una copia # Copy button
    upgradeTitle: Actualizar para ver, restaurar y duplicar # Upgrade prompt title
    errors:
      cannotView: No puedes ver esta versión # Error toast
      cannotCopy: No puedes copiar esta versión # Error toast
    restoreConfirmation:
      title: ¿Restaurar esta versión? # Restore confirmation title
      message: Tu diagrama actual será restaurado a esta versión. # Restore message
    success:
      versionCopied: La versión se ha copiado correctamente. # Success toast
    copiedName: (Restaurada) {name} # Copied version name prefix
    untitled: Sin título # Untitled diagram label

