# Authentication translations - Login, Signup, Password pages
# UI Areas: Auth pages (/login, /signup, /forgot-password)

auth:
  # ========================================
  # Login Page - Email/password login
  # ========================================
  login:
    email: メールアドレス # Email input label
    loginWithGithub: GitHub でログイン # Social login button (GitHub)
    loginWithMicrosoft: Microsoft でログイン # Social login button (Microsoft)

  # ========================================
  # OAuth Errors - OAuth flow errors
  # ========================================
  oauth:
    authorizationError: 認証に失敗しました # OAuth error title
    processing: 処理中... # Loading state (OAuth redirect)
    justAMomentPleaseWait: 少々お待ちください... # Loading message (OAuth redirect)
    signedInAs: ログイン中のアカウント # Session label (SSO indicator)
    failedSignInGitHub: GitHub でのログインに失敗しました # Error toast (GitHub OAuth)
    failedSignInMicrosoft: Microsoft でのログインに失敗しました。もう一度お試しください！ # Error toast (Microsoft OAuth)

  # ========================================
  # Form Errors - Validation error messages
  # ========================================
  errors:
    invalidEmail: 無効なメールアドレスです。もう一度お試しください！ # Email validation
    githubPopupBlocked: GitHub でのログインにはポップアップを許可してください # Browser setting error

  # ========================================
  # OTP Authentication - One-time password
  # ========================================
  otp:
    signInWithEmail: メールでサインイン # OTP tab label
    otpSentTo: OTP の送信先 # Label (shows masked email)
    wrongEmail: メールアドレスが違いますか？ # Change email link
    changeEmail: メールアドレスを変更 # Change email button
    inputEmail: メールアドレスを入力してください # Email input placeholder
    inputYourOtp: OTP を入力 # OTP input placeholder
    inputOtpCode: メールに送信された OTP コードを入力してください # OTP help text
    signInSuccess: ログインに成功しました # Success message
    didntReceiveOtp: OTP が届きませんか？ # Help text (resend section)
    resendOtp: OTP を再送信 # Resend button
    resendAfter: '{counter}秒後に OTP を再送信できます' # Timer label (disabled state)
    submit: 送信 # OTP submit button
    sendOtpFailed: OTP の送信に失敗しました。もう一度お試しください！ # Error toast

  # ========================================
  # SSO Login - Single Sign-On
  # ========================================
  sso:
    orContinueWith: または以下で続行 # SSO divider text

  # ========================================
  # Embedded Portal - OAuth portal pages
  # ========================================
  portal:
    signIn: サインイン # Button (portal embedded login)
    signInWith: '〜でサインイン'

  # ========================================
  # Additional Errors - Extra error messages
  # ========================================
  additional:
    unknownError: 不明なエラー # Fallback error
    invalidOtp: 無効な OTP です。もう一度お試しください！ # OTP validation error
    cannotValidateOtp: OTP を検証できません。もう一度お試しください！ # OTP validation failure
    emailNotVerified: メールアドレスが確認されていません。Microsoft アカウントで確認してください。 # MS email verification
    cannotSignInMicrosoftSSO: Microsoft SSO でサインインできません。もう一度お試しください！ # MS SSO error
    cannotSignIn: サインインできません。もう一度お試しください！ # Generic sign-in error
    failedReloadProject: ログイン後のプロジェクトの再読み込みに失敗しました。ページを更新してください。 # Reload error
    loginError: ログインエラー # Generic login error
    signInCancelled: サインインがキャンセルされました。もう一度お試しください。 # Cancelled flow

  # ========================================
  # Logout Callback - Post-logout redirect
  # ========================================
  logoutCallback:
    redirecting: リダイレクト中... # Loading message (logout redirect)
    redirectDescription: 数秒後にアプリケーションにリダイレクトされます。 # Help text

  popupsWarning:
    title: サインインウィンドウを表示できません
    description: サインインウィンドウがブラウザまたは拡張機能によってブロックされた可能性があります。設定を確認して、もう一度お試しください。
    needHelp: お困りですか？
    contactSupport: サポートに問い合わせる
