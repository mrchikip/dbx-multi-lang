databaseGuidelines:
  mysql:
    title: MySQL
    install: インストール
    tool: mysqldump
    terminalCommand: ターミナルで以下のコマンドを実行してください
    linuxPrefix: Linux では先頭に
    sudo: sudo
    linuxSuffix: を追加する必要があるかもしれません
    example: 例
    step3: ダンプされた SQL の内容をコピーして、このモーダルに貼り付けてください

  postgres:
    title: PostgreSQL
    install: インストール
    tool: pg_dump
    terminalCommand: ターミナルで以下のコマンドを実行してください
    linuxPrefix: Linux では先頭に
    sudo: sudo
    linuxSuffix: を追加する必要があるかもしれません
    example: 例
    step3: ダンプされた SQL の内容をコピーして、このモーダルに貼り付けてください

