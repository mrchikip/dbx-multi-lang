  sqlServer:
    title: SQL Server
    step1: ダウンロードしてインストール
    tool: SQL Server Management Studio
    step1Suffix: SSMS
    step2: SSMS を開き、SQL Server に接続してください
    step3: 接続後、エクスポートするデータベースを右クリックして選択してください
    scriptDatabaseAs: Script Database as
    createTo: CREATE To
    newQueryEditorWindows: New Query Editor Windows
    step4: ダンプされた SQL の内容をコピーして、このモーダルに貼り付けてください

  oracle:
    title: Oracle
    description: 以下のコマンドを手動で実行し、SQL ファイルを
    uploadSql: .sql をアップロード
    createDirectory: Oracle にディレクトリオブジェクトを作成
    grantPrivileges: ディレクトリオブジェクトに読み書き権限を付与
    exportSchema: 特定のスキーマをダンプファイルにエクスポート
    convertDump: ダンプファイルを SQL ファイルに変換

  snowflake:
    title: Snowflake
    description: 以下のコマンドを手動で実行してください
    getDdl: GET_DDL
    descriptionSuffix: コマンドの出力をコピーして画面のテキスト入力に貼り付けるか、ファイルに保存して以下を使用してアップロードしてください
    uploadSql: .sql をアップロード
    exportAllTables: データベース全体のすべてのテーブル DDL をエクスポート
    selectSchema: 単一スキーマのすべてのテーブルを選択
