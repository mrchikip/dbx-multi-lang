# Home page translations - Landing page
# UI Areas: Homepage (/), Hero section, Features, Testimonials, FAQ

home:
  hero:
    title: ER ダイアグラムを、簡単に描こう 😎
    subtitle: コードを書くだけで ER ダイアグラムが描ける、無料でシンプルなツールです。<br>開発者やデータアナリスト向けに設計されています。
    stats: 世界中で300万以上のダイアグラムが作成されました
    testimonialsLink: ユーザーの声を見る 💙
    cta: ダイアグラムを作成する
    orImport: またはインポート
    database: データベース

  features:
    writeCode:
      title: コードを書いて、ビジュアルなダイアグラムを取得
      description: 入力するだけで ER ダイアグラムが表示されます。キーボードから手を離す必要はありません。
      learnMore: 詳しく見る
    collaborate:
      title: リアルタイムで一緒にデザイン
      description: チームを招待して、ダイアグラムを同時に共同編集できます。Google Docs のように、変更がリアルタイムで反映されます。全員が同じページを共有できます。
      learnMore: 詳しく見る
    largeScale:
      title: 大規模なデータベース設計をマスター
      description: 折りたたみ可能なテーブルグループ、カスタマイズされたビュー、カラーコーディングで大規模なダイアグラムをシンプルにし、明確さとコラボレーションのための的確な視点を作成できます。
      learnMore: 詳しく見る
    aiAssistant:
      title: AI でデータベースを素早く設計
      description: データベースのニーズを自然言語で説明するだけで、AI が残りを処理します。アイデアのスピードに合わせた反復的な設計に最適です。
      learnMore: 詳しく見る
    importSql:
      title: SQL データベースからインポート
      description: データベースや SQL ダンプファイルからダイアグラムを素早く生成できます。
    generateSql:
      title: SQL ステートメントを生成
      description: データベーステーブルを作成する SQL ステートメントを直接生成できます。
    exportImages:
      title: 画像や PDF にエクスポート
      description: ER ダイアグラムの美しい PDF を作成し、社内で共有できます。ERD の作成がこんなに簡単だなんて、誰が想像したでしょう？
    oneClickShare:
      title: ワンクリック共有
      description: ワンクリックで、同僚や顧客とダイアグラムをオンラインで共有できます。
    versionHistory:
      title: 変更を追跡し、過去に戻る
      description: ダイアグラムの変更の完全な履歴にアクセスできます。バージョンを比較し、以前の状態に復元するか、任意の時点からコピーを作成できます。
      learnMore: 詳しく見る
    embed:
      title: Wiki、ブログ、ドキュメントサイトに埋め込み
      description: ダイアグラムを社内 Wiki、ブログ、ドキュメントサイト（Notion、Confluence など）に直接埋め込めます。ドキュメントを常に最新の状態に保てます。
      learnMore: 詳しく見る
    everythingYouNeed: 複雑なデータベースの設計に必要なすべて 🚀

  testimonials:
    title: ユーザーの声 🤟
    moreLove: もっと見る
    moreLoveDescription: dbdiagram についてのユーザーの声をご覧ください。
    productHunt: Product Hunt
    productHuntDescription: Product Hunt でのローンチとコミュニティのフィードバックをご覧ください。

  companies:
    title: あらゆるセクターのプロダクト、データ、エンジニアリングチームに選ばれています

  faq:
    title: よくある質問
    pricing:
      question: <router-link to="/">dbdiagram.io</router-link> はずっと無料ですか？料金はどうなっていますか？
      answer: はい、もちろんです！アプリは永久に無料です。<br>有料プランでさらにパワフルな機能と無制限のダイアグラムをご利用いただけます。<router-link class="underline" to="/pricing">詳しく見る。</router-link>
    who:
      question: あなたたちは誰ですか？なぜこれを作ったのですか？
      answer: 私たちはシンガポールに拠点を置くビジネスインテリジェンス製品会社 <a target="_blank" href="https://www.holistics.io/">Holistics.io</a> です。顧客のデータベーススキーマを素早く可視化するために dbdiagram を社内で構築しました。これを、より広いデータコミュニティが使えるスタンドアロン製品にしたら素晴らしいと考えました！
    bugs:
      question: バグの報告や機能のリクエストはどうすればいいですか？
      answer: <a class="underline" target="_blank" href="https://community.dbdiagram.io/">コミュニティフォーラム</a>に投稿してください。すべての投稿について即座に通知を受け取ります。または、<a class="underline" target="_blank" href="https://form.jotform.com/200914527435049">フィードバックフォーム</a>を送信することもできます。
    dsl:
      question: dbdiagram の DSL はどのマークアップ言語に従っていますか？
      answer: 私たちは <a class="underline" href="https://dbml.dbdiagram.io/home" target="_blank">DBML - Database Markup Language</a> を使用しています。これはデータベース構造を簡単にドキュメント化するために設計されたマークアップ言語です。実際、DBML は dbdiagram から生まれました！dbdiagram DSL を DBML に変換し、すべての人が利用できるようにしました。<br> <br>DBML は <a class="underline" href="https://github.com/holistics/dbml" target="_blank">Github</a> で完全にオープンソースです。

  about:
    title: 私たちについて 🤟
    description: ❤️ dbdiagram.io は <a target="_blank" href="https://www.holistics.io/"><b>holistics.io</b></a> のチームが、データコミュニティへの愛を込めて構築しました ❤️
    details: Holistics は、データエンジニアリングの必要性を削減するパワフルな BI プラットフォームです。アナリストに SQL を使って<br>データウェアハウスを構築する力を与え、すべての人にインサイトを届ける自動レポートルーチンを構築するツールを提供します。
    getStarted: 始める

  builtBy: 開発元
  browserNotSupported: お使いのブラウザはビデオタグをサポートしていません。
