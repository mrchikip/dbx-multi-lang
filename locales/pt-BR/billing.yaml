# Billing translations - Pricing, subscriptions, payment
# UI Areas: Pricing page, Billing settings, Upgrade modals

billing:
  # ========================================
  # Billing Buttons - Action buttons
  # ========================================
  buttons:
    upgrade: Fazer Upgrade
    upgradeToPersonalPro: Fazer upgrade para o plano Personal Pro
    collaborateWithTeam: Colabore com o plano Team

  # ========================================
  # Pricing Page - Pricing table
  # ========================================
  pricing:

  # ========================================
  # Plan Details - Individual plan info
  # ========================================
  plans:
    free:
      features:
        - Até 3 diagramas
        - Ferramentas básicas de edição
        - Exportar como SQL/PNG
        - Suporte da comunidade

    pro:
      features:
        - Diagramas ilimitados
        - Ferramentas avançadas de edição
        - Histórico de versões
        - Suporte prioritário
        - Exportar como PDF
        - Temas personalizados

    team:
      features:
        - Tudo do plano Pro
        - Colaboração em equipe
        - Controles de administrador
        - Autenticação SSO
        - Suporte prioritário
        - Integrações personalizadas

  # ========================================
  # Payment Form - Credit card inputs
  # ========================================
  payment:
    paymentMethod: Método de pagamento

  # ========================================
  # Billing History - Invoice section
  # ========================================
  billing:

  # ========================================
  # Subscription Management - Subscription actions
  # ========================================
  subscription:

  # ========================================
  # Personal Pro Plan - Plan features list
  # ========================================
  personalPro:

  # ========================================
  # Team Plan - Plan features list
  # ========================================
  team:

  # ========================================
  # Public Pricing - Public pricing page
  # ========================================
  publicPricing:

  # ========================================
  # Upgrade Button - Contextual upgrade
  # ========================================
  upgradeNowBtn:
    ownerOnly: Apenas o proprietário do workspace pode fazer upgrade para o plano Team

  # ========================================
  # Manage Plan Modal - Subscription details
  # ========================================
  managePlanModal:
    loadingSubscription: Carregando informações da assinatura...
    currentPlan: Plano atual
    personalPlanForever: Plano Pessoal - Para sempre
    unknownPlan: Plano desconhecido
    billedMonthly: Cobrado mensalmente
    billedAnnually: Cobrado anualmente
