    nextPayment: Seu próximo pagamento é
    chargedOn: a ser cobrado em
    editSubscription: Editar assinatura
    switchToMonthly: Mudar para cobrança mensal
    switchToYearly: Mudar para cobrança anual
    noPaymentMethod: Nenhum método de pagamento
    updatePaymentMethod: Atualizar método de pagamento
    invoicing: Faturamento
    lastPayment: Último pagamento
