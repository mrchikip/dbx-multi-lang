      revokeContent: Você deseja revogar o Token de API "{name}"? Esta ação não pode ser desfeita.
      revokePositive: Revogar Token
      revokeSuggestion: 'Por favor, digite <i>permanently delete</i> no campo de texto para confirmar.'
