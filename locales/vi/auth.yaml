# Authentication translations - Login, Signup, Password pages
# UI Areas: Auth pages (/login, /signup, /forgot-password)

auth:
  # ========================================
  # Login Page - Email/password login
  # ========================================
  login:
    email: Email # Email input label
    loginWithGithub: Đăng nhập bằng GitHub # Social login button (GitHub)
    loginWithMicrosoft: Đăng nhập bằng Microsoft # Social login button (Microsoft)

  # ========================================
  # OAuth Errors - OAuth flow errors
  # ========================================
  oauth:
    authorizationError: Ủy quyền thất bại # OAuth error title
    processing: Đang xử lý... # Loading state (OAuth redirect)
    justAMomentPleaseWait: Vui lòng đợi trong giây lát... # Loading message (OAuth redirect)
    signedInAs: Bạn đang đăng nhập với tư cách là # Session label (SSO indicator)
    failedSignInGitHub: Đăng nhập bằng GitHub thất bại # Error toast (GitHub OAuth)
    failedSignInMicrosoft: Đăng nhập bằng Microsoft thất bại, vui lòng thử lại! # Error toast (Microsoft OAuth)

  # ========================================
  # Form Errors - Validation error messages
  # ========================================
  errors:
    invalidEmail: Địa chỉ email không hợp lệ, vui lòng thử lại! # Email validation
    githubPopupBlocked: Vui lòng cho phép cửa sổ bật lên để đăng nhập bằng GitHub # Browser setting error

  # ========================================
  # OTP Authentication - One-time password
  # ========================================
  otp:
    signInWithEmail: Đăng nhập bằng Email # OTP tab label
    otpSentTo: OTP đã được gửi đến # Label (shows masked email)
    wrongEmail: Sai địa chỉ email? # Change email link
    changeEmail: Đổi email # Change email button
    inputEmail: Vui lòng nhập địa chỉ email của bạn # Email input placeholder
    inputYourOtp: Nhập mã OTP của bạn # OTP input placeholder
    inputOtpCode: Vui lòng nhập mã OTP được gửi đến email # OTP help text
    signInSuccess: Đăng nhập thành công # Success message
    didntReceiveOtp: Không nhận được OTP? # Help text (resend section)
    resendOtp: Gửi lại OTP # Resend button
    resendAfter: Bạn có thể gửi lại OTP sau {counter} giây # Timer label (disabled state)
    submit: Gửi # OTP submit button
    sendOtpFailed: Gửi OTP thất bại, vui lòng thử lại! # Error toast

  # ========================================
  # SSO Login - Single Sign-On
  # ========================================
  sso:
    orContinueWith: hoặc tiếp tục với # SSO divider text

  # ========================================
  # Embedded Portal - OAuth portal pages
  # ========================================
  portal:
    signIn: Đăng nhập # Button (portal embedded login)
    signInWith: Đăng nhập với

  # ========================================
  # Additional Errors - Extra error messages
  # ========================================
  additional:
    unknownError: Lỗi không xác định # Fallback error
    invalidOtp: Mã OTP không hợp lệ, vui lòng thử lại! # OTP validation error
    cannotValidateOtp: Không thể xác thực OTP, vui lòng thử lại! # OTP validation failure
    emailNotVerified: Email của bạn chưa được xác minh. Vui lòng xác minh trên tài khoản Microsoft. # MS email verification
    cannotSignInMicrosoftSSO: Không thể đăng nhập bằng Microsoft SSO, vui lòng thử lại! # MS SSO error
    cannotSignIn: Không thể đăng nhập, vui lòng thử lại! # Generic sign-in error
    failedReloadProject: Tải lại dự án sau khi đăng nhập thất bại. Vui lòng làm mới trang. # Reload error
    loginError: Lỗi đăng nhập # Generic login error
    signInCancelled: Đăng nhập đã bị hủy. Vui lòng thử lại. # Cancelled flow

  # ========================================
  # Logout Callback - Post-logout redirect
  # ========================================
  logoutCallback:
    redirecting: Đang chuyển hướng... # Loading message (logout redirect)
    redirectDescription: Bạn sẽ được chuyển đến ứng dụng trong vài giây. # Help text

  popupsWarning:
    title: Không thể mở cửa sổ đăng nhập
    description: Cửa sổ đăng nhập có thể đã bị chặn bởi trình duyệt hoặc tiện ích mở rộng. Vui lòng kiểm tra cài đặt và thử lại.
    needHelp: Bạn cần trợ giúp?
    contactSupport: Liên hệ hỗ trợ
