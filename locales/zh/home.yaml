    productHuntDescription: 在 Product Hunt 上了解我们的发布和社区反馈。

  companies:
    title: 各行业的产品、数据和工程团队的选择

  faq:
    title: 常见问题
    pricing:
      question: <router-link to="/">dbdiagram.io</router-link> 永久免费吗？定价如何？
      answer: 当然！此应用永久免费。<br>你还可以通过我们的付费方案获得更多功能和无限图表。<router-link class="underline" to="/pricing">了解更多。</router-link>
    who:
      question: 你们是谁？为什么开发这个？
      answer: 我们是 <a target="_blank" href="https://www.holistics.io/">Holistics.io</a>，一家总部位于新加坡的商业智能产品公司。我们在内部构建了 dbdiagram，以便快速可视化客户的数据库模式。我们认为将其转化为面向更广泛数据社区的独立产品会很棒！
    bugs:
      question: 如何报告错误或请求功能？
      answer: 你可以在我们的<a class="underline" target="_blank" href="https://community.dbdiagram.io/">社区论坛</a>上发帖，我们会收到每个帖子的即时通知。或者，你可以提交<a class="underline" target="_blank" href="https://form.jotform.com/200914527435049">反馈表</a>。
    dsl:
      question: dbdiagram 的 DSL 遵循什么标记语言？
      answer: 我们使用 <a class="underline" href="https://dbml.dbdiagram.io/home" target="_blank">DBML - Database Markup Language</a>，一种专为轻松记录数据库结构而设计的标记语言。事实上，DBML 就是从 dbdiagram 中诞生的！我们将 dbdiagram 的 DSL 转化为 DBML，并向所有人开放使用。<br> <br>DBML 在 <a class="underline" href="https://github.com/holistics/dbml" target="_blank">Github</a> 上完全开源。

  about:
    title: 关于我们 🤟
    description: ❤️ dbdiagram.io 由 <a target="_blank" href="https://www.holistics.io/"><b>holistics.io</b></a> 的团队用爱为数据社区构建 ❤️
    details: Holistics 是一个强大的 BI 平台，减少你对数据工程的需求。我们赋能你的分析师使用 SQL<br>来构建数据仓库，并为他们提供工具来构建自动化报告流程，向每个人提供洞察。
    getStarted: 开始使用

  builtBy: 构建者
  browserNotSupported: 你的浏览器不支持视频标签。
