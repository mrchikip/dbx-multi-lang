home:
  hero:
    title: 轻松绘制实体关系图 😎
    subtitle: 一个免费、简单的工具，只需编写代码即可绘制ER图。<br>专为开发者和数据分析师设计。
    stats: 全球已创建超过 300 万个图表
    testimonialsLink: 看看我们的用户怎么说 💙
