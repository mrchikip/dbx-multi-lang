      title: 使用 AI 更快地设计数据库
      description: 用自然语言描述你的数据库需求，让 AI 处理其余的工作。非常适合与你的想法同步的迭代设计。
      learnMore: 了解更多
    importSql:
      title: 从 SQL 数据库导入
      description: 从你的数据库或 SQL 转储文件快速生成图表。
    generateSql:
      title: 生成 SQL 语句
      description: 直接生成 SQL 语句来创建你的数据库表。
    exportImages:
      title: 导出为图片和 PDF
      description: 创建精美的 ER 图 PDF 在团队内部分发。谁说 ERD 很难创建？
    oneClickShare:
      title: 一键分享
      description: 只需一键即可在线与同事和客户分享你的图表。
    versionHistory:
      title: 追踪变更，穿越时空
      description: 访问图表的完整变更历史。比较版本、恢复之前的状态，或从任何时间点创建副本。
      learnMore: 了解更多
    embed:
      title: 嵌入到wiki、博客或文档站点
      description: 将图表直接嵌入到你的内部 wiki、博客或文档站点（Notion、Confluence 等）。让你的文档始终保持最新。
      learnMore: 了解更多
    everythingYouNeed: 设计复杂数据库所需的一切 🚀

  testimonials:
    title: 人们对我们的评价 🤟
    moreLove: 更多好评
