    orImport: 或导入自
    database: 数据库

  features:
    writeCode:
      title: 编写代码，获得可视化图表
      description: 你只需输入，ER图就会出现。你的手指不需要离开键盘。
      learnMore: 了解更多
    collaborate:
      title: 实时协作设计
      description: 邀请你的团队同时协作编辑图表。像在 Google Docs 中一样实时查看更改。保持团队同步。
      learnMore: 了解更多
